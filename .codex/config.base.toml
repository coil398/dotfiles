# NOTE: codex 0.141.0 では named permission profile 方式（top-level
# `default_permissions = "..."` + `[permissions.<name>.filesystem.*]`）を適用すると
# seatbatch sandbox 生成時に無音 SIGABRT（exit 134）でクラッシュし、コマンドが軒並み落ちる。
# `"." = "write"` のみの最小プロファイルでも再現。旧来の `sandbox_mode` 方式は健全なので
# こちらを使う。default_permissions / [permissions.*] を再導入しないこと（sync-codex.sh も同様）。
sandbox_mode = "workspace-write"
model = "gpt-5.6-sol"
model_reasoning_effort = "high"
personality = "pragmatic"
approval_policy = "on-request"
approvals_reviewer = "auto_review"

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[sandbox_workspace_write]
network_access = true

# プロジェクト trust ([projects."<absolute path>"]) はマシン固有の絶対パスのため、
# この共有 SSOT には置かない（Mac/Linux 間で累積・混在する原因になる）。
# 各マシンの .codex/config.toml（git 管理外）側に保持し、sync-codex.sh の再生成時に
# preserve_projects_toml が既存 config.toml から引き継ぐ。

[tools]
web_search = true

[notice.model_migrations]
gpt-5-codex = "gpt-5.2-codex"

[tui.model_availability_nux]
"gpt-5.5" = 1
