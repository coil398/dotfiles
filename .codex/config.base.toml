# NOTE: codex 0.141.0 では named permission profile 方式（top-level
# `default_permissions = "..."` + `[permissions.<name>.filesystem.*]`）を適用すると
# seatbatch sandbox 生成時に無音 SIGABRT（exit 134）でクラッシュし、コマンドが軒並み落ちる。
# `"." = "write"` のみの最小プロファイルでも再現。旧来の `sandbox_mode` 方式は健全なので
# こちらを使う。default_permissions / [permissions.*] を再導入しないこと（sync-codex.sh も同様）。
sandbox_mode = "workspace-write"
model = "gpt-5.5"
model_reasoning_effort = "high"
personality = "pragmatic"
approval_policy = "on-request"
approvals_reviewer = "auto_review"

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[sandbox_workspace_write]
network_access = true

[projects."/home/coil398/ghq/github.com/coil398/samuraiquant"]
trust_level = "trusted"

[projects."/home/coil398/ghq/github.com/coil398/home-K8s-db"]
trust_level = "trusted"

[projects."/home/coil398/ghq/github.com/coil398/home-K8s-workers"]
trust_level = "trusted"

[projects."/home/coil398/ghq/github.com/coil398/home-K8s"]
trust_level = "trusted"

[projects."/home/coil398/ghq/github.com/coil398/home-K8s-workflows"]
trust_level = "trusted"

[projects."/home/coil398/ghq/github.com/coil398/ea"]
trust_level = "trusted"

[projects."/home/coil398/Documents/workspace"]
trust_level = "trusted"

[projects."/home/coil398"]
trust_level = "trusted"

[projects."/home/coil398/ghq/github.com/alpha-insiders/Opal"]
trust_level = "trusted"

[projects."/home/coil398/dotfiles"]
trust_level = "trusted"

[projects."/Users/kawasetakumi/dotfiles"]
trust_level = "trusted"

[projects."/home/coil398/ghq/github.com/astran-jp/motitan-api"]
